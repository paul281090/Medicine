<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Inventario Medicine</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f4f7f6;color:#17201f}
.wrap{max-width:820px;margin:0 auto;padding:14px 14px 24px}
.card{background:#fff;border:1px solid rgba(23,32,31,.12);border-radius:18px;box-shadow:0 10px 30px rgba(10,28,26,.08);overflow:hidden}
.hero{padding:16px}
h1{margin:0 0 6px;font-size:clamp(1.6rem,4vw,2.1rem)}
.top{display:flex;gap:10px;flex-wrap:wrap;padding:0 16px 16px}
.note{margin:0;color:#64706d}
.row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:12px 14px;border-top:1px solid rgba(23,32,31,.08)}
.name{font-weight:800;letter-spacing:.02em}
.qty{min-width:52px;text-align:center;font-weight:900;font-size:1.05rem;background:#eef4f3;border:1px solid rgba(23,32,31,.10);border-radius:14px;padding:10px 12px}
.btn{width:auto;height:42px;border:0;border-radius:14px;font-size:1rem;font-weight:900;padding:0 14px}
.btn.minus{background:#eef4f3;color:#17201f}
.btn.plus{background:#d9f5e8;color:#14532d}
.actions{display:flex;gap:10px;flex-wrap:wrap;padding:14px}
.save{background:#0f766e;color:#fff}
.back{background:#eef4f3;color:#17201f}
.dirty{padding:0 14px 14px;color:#9a5b00;font-weight:700;display:none}
</style>
</head>
<body>
<main class="wrap">
  <section class="card hero">
    <h1>Inventario Medicine</h1>
    <p class="note">Modifica le quantità e usa Salva per confermare le modifiche.</p>
  </section>
  <section class="card" id="list"></section>
  <div class="dirty" id="dirtyMsg">Hai modifiche non salvate.</div>
  <div class="card actions">
    <button class="btn save" id="saveBtn">Salva</button>
    <button class="btn back" id="backBtn">Indietro</button>
  </div>
</main>
<script>
const meds = [['CARDIOASPIRINA',1],['SOTALEX',3],['FEMOSTON',2],['METOTREXATE',3],['OMEPRAZOLO',3],['VENLAFAXINA',3],['URBASON',1],['FOLINA',1],['LASIX',2]];
const list = document.getElementById('list');
const dirtyMsg = document.getElementById('dirtyMsg');
let dirty = false;
let state = JSON.parse(localStorage.getItem('inventario-medicine') || 'null') || Object.fromEntries(meds);
function setDirty(v){ dirty = v; dirtyMsg.style.display = v ? 'block' : 'none'; }
function render(){ list.innerHTML=''; meds.forEach(([name, def])=>{ const qty = state[name] ?? def; const row = document.createElement('div'); row.className='row'; row.innerHTML = `<div class="name">${name}</div><button class="btn minus">−</button><div class="qty">${qty}</div><button class="btn plus">+</button>`; const qtyEl = row.querySelector('.qty'); row.querySelector('.minus').onclick = ()=>{ state[name]=Math.max(0, (parseInt(qtyEl.textContent,10)||0)-1); qtyEl.textContent=state[name]; setDirty(true); }; row.querySelector('.plus').onclick = ()=>{ state[name]=(parseInt(qtyEl.textContent,10)||0)+1; qtyEl.textContent=state[name]; setDirty(true); }; list.appendChild(row); }); }
document.getElementById('saveBtn').onclick = ()=>{ if(!dirty) return alert('Nessuna modifica da salvare.'); if(confirm('Vuoi salvare le modifiche all'inventario?')){ localStorage.setItem('inventario-medicine', JSON.stringify(state)); setDirty(false); alert('Inventario salvato.'); } };
document.getElementById('backBtn').onclick = ()=>{ location.href = 'Medicine_Nonna_dal_10-07-2026_con_inventario_link.html'; };
window.addEventListener('beforeunload', (e)=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });
render();
</script>
</body>
</html>
