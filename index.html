<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Index con Inventario</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f4f7f6;color:#17201f}
.wrap{max-width:820px;margin:0 auto;padding:14px}
.card{background:#fff;border:1px solid rgba(23,32,31,.12);border-radius:18px;box-shadow:0 10px 30px rgba(10,28,26,.08);overflow:hidden;margin-bottom:14px}
.hero{padding:16px}
h1{margin:0 0 6px;font-size:clamp(1.6rem,4vw,2.1rem)}
.subtitle{margin:0;color:#64706d}
.summary{padding:12px 14px;background:#eef4f3;border-top:1px solid rgba(23,32,31,.08);border-bottom:1px solid rgba(23,32,31,.08)}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:14px}
.btn{appearance:none;border:0;border-radius:14px;padding:13px 16px;font-weight:800;font-size:.96rem;min-height:46px}
.primary{background:#0f766e;color:#fff}
.secondary{background:#eef4f3;color:#17201f;border:1px solid rgba(23,32,31,.12)}
.inventario{width:100%;background:#0f766e;color:#fff;font-size:1.02rem;box-shadow:0 8px 18px rgba(15,118,110,.22)}
.stack{display:grid;gap:10px}
.small{color:#64706d;font-size:.95rem}
</style>
</head>
<body>
<div class="wrap">
  <section class="card hero">
    <h1>Medicine Nonna</h1>
    <p class="subtitle">Pagina principale con accesso diretto all’inventario.</p>
  </section>
  <section class="card">
    <div class="summary">Mostra / nascondi riepilogo</div>
    <div class="row"><button class="btn inventario" onclick="location.href='inventario.html'">Inventario</button></div>
    <div class="row"><button class="btn primary">Spunta tutto</button><button class="btn secondary">Azzera giorno</button></div>
  </section>
  <section class="card" style="padding:14px">
    <div class="small">Anteprima: il tasto Inventario è subito sotto il riepilogo ed è largo tutto lo spazio disponibile.</div>
  </section>
</div>
</body>
</html>
