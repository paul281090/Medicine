<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Inventario Medicine</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f4f7f6;color:#17201f}
.wrap{max-width:820px;margin:0 auto;padding:14px 14px 24px}
.card{background:#fff;border:1px solid rgba(23,32,31,.12);border-radius:18px;box-shadow:0 10px 30px rgba(10,28,26,.08);overflow:hidden}
.hero{padding:16px}
h1{margin:0 0 6px;font-size:clamp(1.6rem,4vw,2.1rem)}
.subtitle{margin:0;color:#64706d}
.row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:12px 14px;border-top:1px solid rgba(23,32,31,.08)}
.name{font-weight:800;letter-spacing:.02em}
.qty{min-width:52px;text-align:center;font-weight:900;font-size:1.05rem;background:#eef4f3;border:1px solid rgba(23,32,31,.10);border-radius:14px;padding:10px 12px}
.btn{width:42px;height:42px;border:0;border-radius:14px;font-size:1.2rem;font-weight:900;background:#d9f5e8;color:#14532d}
.btn.minus{background:#eef4f3;color:#17201f}
.note{padding:12px 14px;color:#64706d;font-size:.92rem;border-top:1px solid rgba(23,32,31,.08);background:#fbfcfc}
</style>
</head>
<body>
<main class="wrap">
  <section class="card hero">
    <h1>Inventario Medicine</h1>
    
  </section>
  <section class="card" id="list"></section>
  <div class="note">Anteprima semplice: qui potremo aggiungere il salvataggio quantità e il pulsante Inventario in alto nell’app principale.</div>
</main>
<script>
const meds = [
  ['CARDIOASPIRINA',1],['SOTALEX',3],['FEMOSTON',2],['METOTREXATE',3],['OMEPRAZOLO',3],['VENLAFAXINA',3],['URBASON',1],['FOLINA',1],['LASIX',2]
];
const list = document.getElementById('list');
meds.forEach(([name, qty]) => {
  const row = document.createElement('div');
  row.className='row';
  row.innerHTML = `<div class="name">${name}</div><button class="btn minus">−</button><div class="qty">${qty}</div><button class="btn plus">+</button>`;
  const qtyEl = row.querySelector('.qty');
  row.querySelector('.minus').onclick = () => { let v = Math.max(0, parseInt(qtyEl.textContent,10)-1); qtyEl.textContent = v; };
  row.querySelector('.plus').onclick = () => { let v = parseInt(qtyEl.textContent,10)+1; qtyEl.textContent = v; };
  list.appendChild(row);
});
</script>
</body>
</html>
